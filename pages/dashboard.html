<section>
  <div class="page-header">
    <div>
      <h1>Dashboard</h1>
      <p>Factory overview and pending work.</p>
    </div>
    <div class="toolbar dashboard-toolbar">
      <select class="range-select" id="dashboardPeriod" aria-label="Dashboard period">
        <option value="month">Monthly</option>
        <option value="year">Yearly</option>
      </select>
      <input class="range-input" type="month" id="dashboardMonth" aria-label="Dashboard month">
      <input class="range-input hidden" type="number" min="2020" max="2100" id="dashboardYear" aria-label="Dashboard year">
      <button class="btn primary" type="button" id="refreshDashboardBtn">Refresh</button>
    </div>
  </div>
  <div class="stat-grid" id="dashboardStats"></div>
  <section class="dashboard-panel">
    <div class="panel-header">
      <h2>Monthly Trend</h2>
      <div class="chart-legend">
        <span><i class="legend sales"></i>Sales</span>
        <span><i class="legend expense"></i>Expenses</span>
        <span><i class="legend salary"></i>Salary</span>
      </div>
    </div>
    <div class="bar-chart" id="dashboardChart"></div>
  </section>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Type</th>
          <th>Reference</th>
          <th>Due Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="dashboardNotifications"></tbody>
    </table>
  </div>
</section>
